<!DOCTYPE html>
<html>
<head>
    <style>
    body {
        background: #121212;
        font-family: Arial, sans-serif;
    }

    /* Container cho nhiều truyện */
    .container {
        display: flex;
        gap: 20px;
        padding: 20px;
    }

    /* Card truyện */
    .book-card {
        position: relative;
        width: 180px;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        transition: 0.3s;
        cursor: pointer;
    }

    .book-card:hover {
        transform: translateY(-8px) scale(1.03);
    }

    /* Ảnh */
    .book-card img {
        width: 100%;
        height: 240px;
        object-fit: cover;
    }

    /* Nút tim */
    .save-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(255,255,255,0.9);
        border: none;
        border-radius: 50%;
        width: 38px;
        height: 38px;
        cursor: pointer;
        font-size: 18px;
        transition: 0.3s;
    }

    /* Hover tim */
    .save-btn:hover {
        background: red;
        color: white;
    }

    /* Đã lưu */
    .save-btn.saved {
        background: red;
        color: white;
        transform: scale(1.1);
    }

    /* Tên truyện */
    .title {
        position: absolute;
        bottom: 0;
        width: 100%;
        padding: 10px;
        color: white;
        font-size: 14px;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    }

    /* Link tủ sách */
    a {
        display: inline-block;
        margin: 20px;
        padding: 10px 15px;
        background: #1db954;
        color: white;
        border-radius: 8px;
        text-decoration: none;
        transition: 0.3s;
    }

    a:hover {
        background: #1ed760;
    }
    </style>
</head>

<body>

<div class="book-card">
    <img src="sách1.webp" alt="Tên truyện">
    <button class="save-btn">❤</button>
    <div class="title">Nhớ một thời ta đã quên</div>
</div>
<a href="./yeuthich.php">Xem tủ sách</a>

<script>
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll('.save-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            btn.classList.toggle('saved');
            btn.innerHTML = btn.classList.contains('saved') ? '❤' : '❤';
        });
    });
});
</script>

</body>
</html>
